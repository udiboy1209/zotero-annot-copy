name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Build .xpi
        run: bash build.sh

      - name: Update updates.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          XPI_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/zotero-annot-copy.xpi"
          jq --arg v "$VERSION" --arg url "$XPI_URL" \
            '.addons["zotero-annot-copy@mudeshi.in"].updates += [{"version": $v, "update_link": $url}]' \
            updates.json > updates.tmp.json
          mv updates.tmp.json updates.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zotero-annot-copy.xpi
            updates.json
          generate_release_notes: true
